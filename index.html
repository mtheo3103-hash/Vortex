<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vortex Connection Hub</title>
    <style>
        /* Sanftes Scrollen */
        html {
            scroll-behavior: smooth;
        }

        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: #0c0c0e; 
            color: #e1e1e6; 
            margin: 0; 
            padding: 0;
            overflow-x: hidden;
        }

        /* --- SCREEN 1: LANDING PAGE --- */
        .intro-screen {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
            background: radial-gradient(circle at center, #1a1010 0%, #0c0c0e 100%);
            text-align: center;
            padding: 20px;
            box-sizing: border-box;
        }

        .intro-title {
            color: #ff4a4a;
            font-size: 56px;
            text-transform: uppercase;
            letter-spacing: 6px;
            margin: 0;
            text-shadow: 0 0 25px rgba(255, 74, 74, 0.4);
            animation: pulse 3s infinite alternate;
        }

        .intro-tagline {
            font-size: 20px;
            color: #a1a1aa;
            margin-top: 15px;
            font-style: italic;
            letter-spacing: 1px;
        }

        /* Scroll-Pfeil */
        .scroll-hint {
            position: absolute;
            bottom: 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
            text-decoration: none;
            color: #7c7c8a;
            transition: color 0.2s;
        }

        .scroll-hint:hover {
            color: #ff4a4a;
        }

        .scroll-hint span {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 8px;
        }

        .arrow {
            width: 20px;
            height: 20px;
            border-right: 3px solid currentColor;
            border-bottom: 3px solid currentColor;
            transform: rotate(45deg);
            animation: bounce 2s infinite;
        }

        /* --- SCREEN 2: HUB AREA --- */
        .main-content {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px 20px;
            box-sizing: border-box;
            background: #070709;
        }

        .hub-card { 
            background: linear-gradient(135deg, #121214 0%, #170f0f 100%); 
            padding: 40px; 
            border-radius: 16px; 
            box-shadow: 0 25px 50px rgba(0,0,0,0.8); 
            text-align: center; 
            width: 100%;
            max-width: 500px; 
            border-bottom: 4px solid #ff4a4a;
            border-top: 1px solid #2e2e35;
        }

        h2 {
            color: #fff;
            font-size: 24px;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-top: 0;
            margin-bottom: 30px;
        }

        .search-box {
            background: #0c0c0e;
            padding: 25px;
            border-radius: 8px;
            border: 1px solid #2e2e35;
            margin-bottom: 25px;
            text-align: left;
        }

        label {
            display: block;
            font-size: 13px;
            color: #7c7c8a;
            text-transform: uppercase;
            margin-bottom: 10px;
            letter-spacing: 1px;
        }

        .input-group {
            display: flex;
            gap: 12px;
        }

        input { 
            flex: 1; 
            padding: 14px; 
            background: #121214; 
            border: 1px solid #444; 
            border-radius: 6px; 
            color: #fff; 
            font-size: 16px; 
            outline: none; 
            transition: border-color 0.2s;
        }

        input:focus { 
            border-color: #ff4a4a; 
        }

        button { 
            padding: 14px 28px; 
            font-size: 15px; 
            font-weight: bold; 
            border-radius: 6px; 
            border: none; 
            cursor: pointer; 
            background: #ff4a4a; 
            color: white;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: transform 0.1s, background 0.2s; 
        }

        button:hover { background: #e03e3e; }
        button:active { transform: scale(0.98); }

        .result-container {
            margin: 25px 0;
            text-align: left;
        }

        .ip-box { 
            background: #0c0c0e; 
            padding: 18px; 
            border-radius: 6px; 
            font-family: monospace; 
            font-size: 16px; 
            border: 1px dashed #444; 
            color: #7c7c8a; 
            text-align: center;
            cursor: pointer; 
            transition: all 0.2s;
            word-break: break-all;
            min-height: 22px;
        }

        .hint { font-size: 12px; color: #7c7c8a; margin-top: 15px; }

        /* Animationen */
        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% { transform: translateY(0) rotate(45deg); }
            40% { transform: translateY(-10px) rotate(45deg); }
            60% { transform: translateY(-5px) rotate(45deg); }
        }

        @keyframes pulse {
            0% { text-shadow: 0 0 15px rgba(255, 74, 74, 0.2); }
            100% { text-shadow: 0 0 30px rgba(255, 74, 74, 0.6); }
        }
    </style>
</head>
<body>

<div class="intro-screen">
    <h1 class="intro-title">Vortex Network</h1>
    <div class="intro-tagline">Bringe Multiplayer auf ein neues Level.</div>
    
    <a href="#hub" class="scroll-hint">
        <span>Verbinden</span>
        <div class="arrow"></div>
    </a>
</div>

<div class="main-content" id="hub">
    <div class="hub-card">
        <h2>🌀 Server Gateway</h2>
        
        <div class="search-box">
            <label for="serverIdInput">Gepoppte Server-ID eingeben:</label>
            <div class="input-group">
                <input type="text" id="serverIdInput" placeholder="z.B. testt" autocomplete="off" onkeydown="if(event.key==='Enter') fetchServerIp()">
                <button onclick="fetchServerIp()">Suchen</button>
            </div>
        </div>

        <div class="result-container">
            <label>Aktuelle Live-IP für Minecraft:</label>
            <div class="ip-box" id="resultBox" onclick="copyToClipboard()">Bereit für Abfrage...</div>
        </div>
        
        <p class="hint" id="hintText">ID eingeben, suchen und auf die grüne Box klicken, um die IP direkt in die Zwischenablage zu kopieren!</p>
    </div>
</div>

<script>
    let currentFetchedIp = "";

    // Hilfsfunktion: XOR-Entschlüsselung
    function decrypt(base64Text, key) {
        try {
            const text = atob(base64Text);
            let result = '';
            for (let i = 0; i < text.length; i++) {
                result += String.fromCharCode(text.charCodeAt(i) ^ key.charCodeAt(i % key.length));
            }
            return result;
        } catch (e) {
            return null;
        }
    }

    // Hilfsfunktion: Erzeugt einen SHA-256 Hash im Browser
    async function sha256(message) {
        const msgBuffer = new TextEncoder().encode(message);                    
        const hashBuffer = await crypto.subtle.digest('SHA-256', msgBuffer);
        const hashArray = Array.from(new Uint8Array(hashBuffer));
        return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
    }

    // Da wir nun asynchronen Krypto-Code nutzen, machen wir die Hauptfunktion "async"
    async function fetchServerIp() {
        const id = document.getElementById('serverIdInput').value.trim().toLowerCase().replace(/[^a-z0-9]/g, '');
        const resultBox = document.getElementById('resultBox');
        const hintText = document.getElementById('hintText');
        
        if (!id) {
            alert("Bitte gib eine gültige Server-ID ein!");
            return;
        }

        resultBox.style.borderColor = "#ffcc00";
        resultBox.style.color = "#ffcc00";
        resultBox.innerText = "Berechne Sicherheits-Hash...";
        currentFetchedIp = "";

        try {
            // 1. Berechne den Krypto-Fingerabdruck der eingegebenen ID
            const idHash = await sha256(id);
            
            resultBox.innerText = "Durchsuche Datenstrom...";

            // 2. Abruf der server-data.json von GitHub (mit Cache-Buster)
            const res = await fetch(`server-data.json?t=${new Date().getTime()}`);
            if (!res.ok) throw new Error("Netzwerkliste nicht gefunden");
            
            const serverList = await res.json();

            // 3. Überprüfen, ob unser berechneter Hash in der Liste existiert
            if (serverList && serverList[idHash]) {
                const securePayload = serverList[idHash];
                
                // 4. Den gefundenen IP-Salat mit der ID entschlüsseln
                const decryptedIp = decrypt(securePayload, id);
                
                // 5. Verifizieren, ob die Entschlüsselung geklappt hat
                if (decryptedIp && decryptedIp.includes(".trycloudflare.com")) {
                    currentFetchedIp = decryptedIp;
                    resultBox.style.borderColor = "#00ff88";
                    resultBox.style.color = "#00ff88";
                    resultBox.innerText = decryptedIp;
                    hintText.style.color = "#00ff88";
                    hintText.innerText = "Schlüssel korrekt! Server gefunden. Klicke zum Kopieren. ✅";
                } else {
                    throw new Error("Entschlüsselung fehlgeschlagen");
                }
            } else {
                throw new Error("Server-ID nicht in der Liste");
            }

        } catch (err) {
            resultBox.style.borderColor = "#ff4a4a";
            resultBox.style.color = "#ff4a4a";
            resultBox.innerText = "❌ ID nicht gefunden oder Server offline";
            hintText.style.color = "#7c7c8a";
            hintText.innerText = "Der eingegebene Schlüssel existiert nicht oder konnte keine Daten freischalten.";
        }
    }

    function copyToClipboard() {
        const hintText = document.getElementById('hintText');

        if (currentFetchedIp) {
            navigator.clipboard.writeText(currentFetchedIp);
            
            const originalHint = hintText.innerText;
            const originalColor = hintText.style.color;
            
            hintText.style.color = "#00ff88";
            hintText.innerText = "IP kopiert! Starte Minecraft und trete bei! 🎮";
            
            setTimeout(() => {
                hintText.style.color = originalColor;
                hintText.innerText = originalHint;
            }, 3000);
        }
    }
</script>
</body>
</html>
