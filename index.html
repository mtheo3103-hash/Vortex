<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vortex Hub</title>
    <style>
        html {
            scroll-behavior: smooth;
        }

        body { 
            font-family: 'Segoe UI', sans-serif; 
            background: #0c0c0e; 
            color: #e1e1e6; 
            margin: 0; 
            padding: 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
            margin-top: 20px;
        }

        h1 { 
            color: #ff4a4a; 
            margin: 0; 
            font-size: 46px; 
            text-transform: uppercase; 
            letter-spacing: 5px;
            text-shadow: 0 0 20px rgba(255, 74, 74, 0.3);
        }

        .tagline { 
            color: #a1a1aa; 
            font-style: italic; 
            margin-top: 8px; 
            font-size: 16px;
        }

        .container {
            display: flex;
            justify-content: center;
            width: 100%;
            max-width: 500px;
        }

        .card {
            background: linear-gradient(135deg, #121214 0%, #1a1010 100%); 
            padding: 35px;
            border-radius: 12px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.6);
            border-bottom: 3px solid #ff4a4a;
            width: 100%;
            display: flex;
            flex-direction: column;
        }

        h2 { 
            font-size: 20px; 
            text-transform: uppercase; 
            letter-spacing: 1px; 
            margin-top: 0; 
            margin-bottom: 25px; 
            color: #fff; 
        }

        .input-group { 
            display: flex; 
            flex-direction: column; 
            gap: 8px; 
            margin-bottom: 25px; 
        }

        label { 
            font-size: 12px; 
            color: #7c7c8a; 
            text-transform: uppercase; 
            letter-spacing: 1px; 
        }

        input.text-input { 
            padding: 14px; 
            background: #0c0c0e; 
            border: 1px solid #444; 
            border-radius: 6px; 
            color: #fff; 
            font-size: 16px; 
            outline: none; 
            transition: border-color 0.2s;
        }

        input.text-input:focus { 
            border-color: #ff4a4a; 
        }

        button { 
            padding: 14px; 
            font-size: 15px; 
            font-weight: bold; 
            border-radius: 6px; 
            border: none; 
            cursor: pointer; 
            text-transform: uppercase; 
            letter-spacing: 1px; 
            transition: background 0.2s, transform 0.1s;
        }

        button:active { 
            transform: scale(0.98); 
        }

        .btn-start { 
            background: #ff4a4a; 
            color: white; 
        }

        .btn-start:hover { 
            background: #e03e3e; 
        }

        .result-box {
            margin-top: 30px;
            padding: 20px;
            background: #0c0c0e;
            border: 1px solid #2e2e35;
            border-radius: 6px;
            display: none;
            flex-direction: column;
            gap: 12px;
            border-left: 4px solid #00ff88;
            animation: fadeIn 0.4s ease forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .result-title {
            color: #00ff88;
            font-family: monospace;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin: 0;
        }

        .ip-container {
            display: flex;
            gap: 10px;
        }

        .ip-text {
            flex: 1;
            font-family: monospace;
            font-size: 16px;
            font-weight: bold;
            color: #fff;
            background: #121214;
            padding: 12px;
            border-radius: 6px;
            border: 1px solid #2e2e35;
            word-break: break-all;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .btn-copy {
            background: #202024;
            color: #e1e1e6;
            border: 1px solid #444;
            padding: 0 20px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            font-size: 13px;
            text-transform: uppercase;
            transition: all 0.2s;
        }

        .btn-copy:hover {
            background: #121214;
            border-color: #00ff88;
            color: #00ff88;
        }

        .hint { 
            font-size: 12px; 
            color: #7c7c8a; 
            text-align: center; 
            margin-top: 25px; 
        }
    </style>
</head>
<body>

<div class="header">
    <h1>VORTEX HUB</h1>
    <div class="tagline">Bringe Multiplayer auf ein neues Level.</div>
</div>

<div class="container">
    <div class="card">
        <h2>Vortex Receiver (Cloudflare)</h2>
        
        <div class="input-group">
            <label for="serverId">Server-ID deiner Freunde eingeben:</label>
            <input type="text" id="serverId" class="text-input" placeholder="z.B. broserver" autocomplete="off" onkeydown="if(event.key==='Enter') fetchServerIp()">
        </div>

        <button id="btnConnect" class="btn-start" onclick="fetchServerIp()">Verbindung Herstellen</button>
        
        <div id="resultBox" class="result-box">
            <p class="result-title">Verbindung Hergestellt!</p>
            <div class="ip-container">
                <div id="ipDisplay" class="ip-text">---</div>
                <button id="btnCopy" class="btn-copy" onclick="copyIp()">Kopieren</button>
            </div>
        </div>

        <p class="hint">Gib die vom Host festgelegte Wunsch-ID ein, um die direkte Minecraft-IP abzurufen.</p>
    </div>
</div>

<script>
    // 🌐 DEINE CLOUDFLARE WORKER URL:
    const WORKER_URL = "https://wispy-bonus-e55f.mtheo3103.workers.dev/";

    async function fetchServerIp() {
        const idInput = document.getElementById('serverId').value;
        const btn = document.getElementById('btnConnect');
        const resultBox = document.getElementById('resultBox');
        const ipDisplay = document.getElementById('ipDisplay');
        const copyBtn = document.getElementById('btnCopy');

        const cleanId = idInput.toLowerCase().replace(/[^a-z0-9]/g, '');

        if (!cleanId) {
            alert("Bitte gib eine gültige Server-ID ein!");
            return;
        }

        btn.disabled = true;
        btn.innerText = "Verbindung wird abgerufen...";
        resultBox.style.display = "none";
        copyBtn.innerText = "Kopieren";
        copyBtn.style.color = "#e1e1e6";
        copyBtn.style.borderColor = "#444";

        try {
            const encoder = new TextEncoder();
            const data = encoder.encode(cleanId);
            const hashBuffer = await crypto.subtle.digest('SHA-256', data);
            const hashArray = Array.from(new Uint8Array(hashBuffer));
            const idHash = hashArray.map(b => b.toString(16).padStart(2, '0')).join('');

            const response = await fetch(`${WORKER_URL}?hash=${idHash}`);
            
            if (!response.ok) {
                throw new Error("Offline");
            }

            const result = await response.json();

            if (result.success && result.payload) {
                const decryptedIp = decrypt(result.payload, cleanId);

                ipDisplay.innerText = decryptedIp;
                resultBox.style.display = "flex";
                
                setTimeout(() => {
                    resultBox.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
                }, 50);
            } else {
                alert("Server wurde im Vortex-Netzwerk nicht gefunden!");
            }

        } catch (error) {
            alert("Dieser Server ist aktuell offline oder die ID existiert nicht.");
        } finally {
            btn.disabled = false;
            btn.innerText = "Verbindung Herstellen";
        }
    }

    function copyIp() {
        const ipText = document.getElementById('ipDisplay').innerText;
        const copyBtn = document.getElementById('btnCopy');
        
        navigator.clipboard.writeText(ipText).then(() => {
            copyBtn.innerText = "Kopiert!";
            copyBtn.style.color = "#00ff88";
            copyBtn.style.borderColor = "#00ff88";
        }).catch(err => {
            console.error("Fehler beim Kopieren: ", err);
        });
    }

    function decrypt(base64, key) {
        const binary = atob(base64);
        let result = '';
        for (let i = 0; i < binary.length; i++) {
            result += String.fromCharCode(binary.charCodeAt(i) ^ key.charCodeAt(i % key.length));
        }
        return result;
    }
</script>

</body>
</html>
