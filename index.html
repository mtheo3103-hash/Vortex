<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vortex Network Hub</title>
    <style>
        :root {
            --bg-color: #0c0c0e;
            --panel-bg: #121214;
            --accent-color: #ff4a4a;
            --text-color: #e1e1e6;
            --text-muted: #a1a1aa;
            --success-color: #00ff88;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            background: linear-gradient(135deg, #121214 0%, #1a1010 100%);
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.6);
            width: 100%;
            max-width: 420px;
            text-align: center;
            border-bottom: 3px solid var(--accent-color);
        }

        h1 {
            color: var(--accent-color);
            margin: 0 0 5px 0;
            font-size: 32px;
            text-transform: uppercase;
            letter-spacing: 3px;
            text-shadow: 0 0 15px rgba(255, 74, 74, 0.2);
        }

        p.subtitle {
            color: var(--text-muted);
            font-size: 14px;
            margin-bottom: 30px;
            font-style: italic;
        }

        .input-group {
            margin-bottom: 25px;
            text-align: left;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: var(--text-muted);
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        input[type="text"] {
            width: 100%;
            padding: 14px;
            box-sizing: border-box;
            background-color: var(--bg-color);
            border: 1px solid #444;
            border-radius: 6px;
            color: #fff;
            font-size: 16px;
            outline: none;
            transition: border-color 0.2s;
        }

        input[type="text"]:focus {
            border-color: var(--accent-color);
        }

        .btn-main {
            width: 100%;
            padding: 14px;
            background-color: var(--accent-color);
            color: #fff;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: background-color 0.2s, transform 0.1s;
        }

        .btn-main:hover {
            background-color: #e03e3e;
        }

        .btn-main:active {
            transform: scale(0.98);
        }

        .result-box {
            margin-top: 30px;
            padding: 20px;
            background-color: rgba(0, 255, 136, 0.03);
            border: 1px dashed var(--success-color);
            border-radius: 6px;
            display: none;
        }

        .result-box h3 {
            margin: 0 0 15px 0;
            color: var(--success-color);
            text-transform: uppercase;
            font-size: 16px;
            letter-spacing: 1px;
        }

        .ip-container {
            display: flex;
            gap: 10px;
        }

        .ip-text {
            flex: 1;
            font-family: monospace;
            font-size: 16px;
            font-weight: bold;
            color: #fff;
            background: #0c0c0e;
            padding: 12px;
            border-radius: 6px;
            border: 1px solid #2e2e35;
            word-break: break-all;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .btn-copy {
            background: #2e2e35;
            color: #fff;
            border: 1px solid #444;
            padding: 0 15px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            font-size: 14px;
            transition: background 0.2s;
        }

        .btn-copy:hover {
            background: #444;
            border-color: var(--success-color);
            color: var(--success-color);
        }
    </style>
</head>
<body>

<div class="container">
    <h1>🌀 Vortex Hub</h1>
    <p class="subtitle">Trage die ID ein, um die Minecraft-IP zu knacken.</p>
    
    <div class="input-group">
        <label for="serverId">Server Netzwerk ID</label>
        <input type="text" id="serverId" placeholder="z.B. meinserver" autocomplete="off">
    </div>
    
    <button id="btnConnect" class="btn-main" onclick="fetchServerIp()">IP abrufen</button>

    <div id="resultBox" class="result-box">
        <h3>✅ Verbindung entschlüsselt!</h3>
        <div class="ip-container">
            <div id="ipDisplay" class="ip-text">---</div>
            <button id="btnCopy" class="btn-copy" onclick="copyIp()">Kopieren</button>
        </div>
    </div>
</div>

<script>
    // 🌐 DEINE CLOUDFLARE WORKER URL (Hier deine echte URL eintragen!):
    const WORKER_URL = "HIER_DEINE_CLOUDFLARE_WORKER_URL_EINSETZEN";

    async function fetchServerIp() {
        const idInput = document.getElementById('serverId').value;
        const btn = document.getElementById('btnConnect');
        const resultBox = document.getElementById('resultBox');
        const ipDisplay = document.getElementById('ipDisplay');
        const copyBtn = document.getElementById('btnCopy');

        const cleanId = idInput.toLowerCase().replace(/[^a-z0-9]/g, '');

        if (!cleanId) {
            alert("Bitte gib eine gültige Server-ID ein!");
            return;
        }

        btn.disabled = true;
        btn.innerText = "Knacke Verschlüsselung...";
        resultBox.style.display = "none";
        copyBtn.innerText = "Kopieren";

        try {
            // 1. SHA-256 Hash im Browser berechnen
            const encoder = new TextEncoder();
            const data = encoder.encode(cleanId);
            const hashBuffer = await crypto.subtle.digest('SHA-256', data);
            const hashArray = Array.from(new Uint8Array(hashBuffer));
            const idHash = hashArray.map(b => b.toString(16).padStart(2, '0')).join('');

            // 2. Worker abfragen
            const response = await fetch(`${WORKER_URL}?hash=${idHash}`);
            
            if (!response.ok) {
                throw new Error("Offline");
            }

            const result = await response.json();

            if (result.success && result.payload) {
                // 3. Entschlüsseln mithilfe der ID als Key
                const decryptedIp = decrypt(result.payload, cleanId);

                // 4. IP anzeigen
                ipDisplay.innerText = decryptedIp;
                resultBox.style.display = "block";
            } else {
                alert("Server wurde im Vortex-Netzwerk nicht gefunden!");
            }

        } catch (error) {
            alert("Dieser Server ist aktuell offline oder die ID existiert nicht.");
        } finally {
            btn.disabled = false;
            btn.innerText = "IP abrufen";
        }
    }

    // Kopier-Funktion für die Zwischenablage
    function copyIp() {
        const ipText = document.getElementById('ipDisplay').innerText;
        const copyBtn = document.getElementById('btnCopy');
        
        navigator.clipboard.writeText(ipText).then(() => {
            copyBtn.innerText = "Kopiert! ✔";
            copyBtn.style.color = "#00ff88";
        }).catch(err => {
            console.error("Fehler beim Kopieren: ", err);
        });
    }

    // XOR-Entschlüsselung
    function decrypt(base64, key) {
        const binary = atob(base64);
        let result = '';
        for (let i = 0; i < binary.length; i++) {
            result += String.fromCharCode(binary.charCodeAt(i) ^ key.charCodeAt(i % key.length));
        }
        return result;
    }
</script>

</body>
</html>
